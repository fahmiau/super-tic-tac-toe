<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Dark App-style Rounded Background -->
  <rect width="512" height="512" rx="128" fill="#060913" stroke="rgba(255, 255, 255, 0.05)" stroke-width="8" />
  
  <!-- Sleek neon purple grid lines -->
  <line x1="200" y1="96" x2="200" y2="416" stroke="#8b5cf6" stroke-width="24" stroke-linecap="round" opacity="0.3" />
  <line x1="312" y1="96" x2="312" y2="416" stroke="#8b5cf6" stroke-width="24" stroke-linecap="round" opacity="0.3" />
  <line x1="96" y1="200" x2="416" y2="200" stroke="#8b5cf6" stroke-width="24" stroke-linecap="round" opacity="0.3" />
  <line x1="96" y1="312" x2="416" y2="312" stroke="#8b5cf6" stroke-width="24" stroke-linecap="round" opacity="0.3" />

  <!-- Neon Cyan X (Top-Left) -->
  <g filter="drop-shadow(0 0 16px rgba(0, 242, 254, 0.75))">
    <line x1="120" y1="120" x2="176" y2="176" stroke="#00f2fe" stroke-width="32" stroke-linecap="round" />
    <line x1="176" y1="120" x2="120" y2="176" stroke="#00f2fe" stroke-width="32" stroke-linecap="round" />
  </g>

  <!-- Neon Hot Pink O (Bottom-Right) -->
  <g filter="drop-shadow(0 0 16px rgba(255, 42, 133, 0.75))">
    <circle cx="360" cy="360" r="30" fill="none" stroke="#ff2a85" stroke-width="32" />
  </g>

  <!-- Emerald Green Active Accent (Center) -->
  <g filter="drop-shadow(0 0 12px rgba(5, 255, 155, 0.8))">
    <circle cx="256" cy="256" r="14" fill="#05ff9b" />
  </g>
</svg>